[package]
name = "cellsymphony-pi"
version = "0.5.1"
edition = "2021"

[[bin]]
name = "cellsymphony-pi"
path = "src/main.rs"

[dependencies]
cellsymphony-hal = { path = "../../crates/hal" }
platform-core = { path = "../../crates/platform-core" }
playback-runtime = { path = "../../crates/playback-runtime" }
realtime-engine = { path = "../../crates/realtime-engine" }
rodio-engine-source = { path = "../../crates/rodio-engine-source" }
rodio = "0.20"
midir = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
simple_logger = "1.16"

[features]
default = []
hardware-pi = ["cellsymphony-hal/pi-zero"]

[build-dependencies]
image = { version = "0.25", default-features = false, features = ["png"] }
