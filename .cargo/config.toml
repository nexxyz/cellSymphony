# Cargo configuration for cross-compilation to Pi Zero 2W
# Install ARM GNU Toolchain from: https://developer.arm.com/downloads/-/arm-gnu-toolchain-downloads
# Download: arm-gnu-toolchain-*-mingw-w64-x86_64-arm-none-linux-gnueabihf.zip
# Extract to C:\arm-gnu-toolchain and add C:\arm-gnu-toolchain\bin to PATH

[target.armv7-unknown-linux-gnueabihf]
linker = "arm-none-linux-gnueabihf-gcc"
