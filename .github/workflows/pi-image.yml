name: Build Pi Image

# Only run on tags or manual dispatch
on:
  push:
    tags:
      - 'v*'  # Push events to tags matching v*, i.e. v1.0, v20.15.10
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  pi_zero_app_build:
    name: Pi Zero App Build (cross)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: armv7-unknown-linux-gnueabihf
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install cross (prebuilt binary)
        run: |
          curl -sSL https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin
          cross --version
      - name: Build Pi app with cross
        run: cross build --target armv7-unknown-linux-gnueabihf -p cellsymphony-pi
      - name: Upload Pi binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cellsymphony-pi-armv7
          path: target/armv7-unknown-linux-gnueabihf/debug/cellsymphony-pi
          retention-days: 7

  pi_image_build:
    name: Build Pi Zero 2W OS Image
    runs-on: ubuntu-latest
    needs: pi_zero_app_build
    timeout-minutes: 360
    steps:
      - name: Checkout cellSymphony repo
        uses: actions/checkout@v4

      - name: Download cellsymphony-pi binary artifact
        uses: actions/download-artifact@v4
        with:
          name: cellsymphony-pi-armv7
          path: tools/pi-image/stage4-cellsymphony/files/root/usr/local/bin/

      - name: Verify binary exists and is ARM
        run: |
          file tools/pi-image/stage4-cellsymphony/files/root/usr/local/bin/cellsymphony-pi
          chmod +x tools/pi-image/stage4-cellsymphony/files/root/usr/local/bin/cellsymphony-pi

      - name: Install pi-gen dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            quilt parted debootstrap \
            dosfstools rsync btrfs-progs kpartx xz-utils \
            coreutils qemu-user-static libarchive-tools arch-test

      - name: Clone pi-gen (official RPi OS image tool)
        run: |
          git clone --depth 1 --branch bookworm https://github.com/RPi-Distro/pi-gen.git
          cp -r tools/pi-image/stage4-cellsymphony pi-gen/

      - name: Configure pi-gen
        working-directory: pi-gen
        run: |
          cat > config <<EOL
          IMG_NAME=cellsymphony-pi-zero-2w
          RELEASE=bookworm
          TARGET_ARCH=armhf
          STAGE_LIST="stage0 stage1 stage2 stage4-cellsymphony"
          EXPORT_DIR=deploy
          DEPLOY_ZIP=1
          EOL

      - name: Run pi-gen build
        working-directory: pi-gen
        run: sudo ./build.sh

      - name: Upload generated image artifact
        uses: actions/upload-artifact@v4
        with:
          name: cellsymphony-pi-zero-2w-image
          path: pi-gen/deploy/*.zip
          retention-days: 90

      - name: Get version tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        if: startsWith(github.ref, 'refs/tags/')

      - name: Find Pi image zip
        id: find_image
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "ZIP_PATH=$(ls pi-gen/deploy/*.zip | head -1)" >> $GITHUB_OUTPUT

      - name: Create GitHub release (if not exists)
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release upload ${{ github.ref_name }} "${{ steps.find_image.outputs.ZIP_PATH }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
