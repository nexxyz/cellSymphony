name: Release Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag, for example v0.5.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release_info:
    name: Resolve release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      asset_prefix: ${{ steps.release.outputs.asset_prefix }}
    steps:
      - name: Resolve tag and verify release exists
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          if ! echo "$RELEASE_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release tag must look like v0.5.0; got $RELEASE_TAG" >&2
            exit 1
          fi
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null
          VERSION="${RELEASE_TAG#v}"
          {
            echo "tag=$RELEASE_TAG"
            echo "version=$VERSION"
            echo "asset_prefix=CellSymphony-$VERSION"
          } >> "$GITHUB_OUTPUT"

  windows:
    name: Windows installer and portable EXE
    runs-on: windows-latest
    needs: release_info
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release_info.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installer
        run: pnpm run tauri:build

      - name: Prepare Windows release assets
        id: windows_assets
        shell: pwsh
        run: |
          $assetDir = New-Item -ItemType Directory -Force -Path "release-assets"
          $installer = Get-ChildItem -Path "target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer not found" }
          $portable = "target/release/cellsymphony-desktop.exe"
          if (-not (Test-Path -LiteralPath $portable)) { throw "Portable executable source not found" }
          $installerAsset = Join-Path $assetDir "${{ needs.release_info.outputs.asset_prefix }}-windows-installer.exe"
          $portableAsset = Join-Path $assetDir "${{ needs.release_info.outputs.asset_prefix }}-windows-portable.exe"
          Copy-Item -LiteralPath $installer.FullName -Destination $installerAsset
          Copy-Item -LiteralPath $portable -Destination $portableAsset
          Get-ChildItem -LiteralPath $assetDir | ForEach-Object { Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName } | ForEach-Object { "$($_.Hash.ToLower())  $([IO.Path]::GetFileName($_.Path))" } | Set-Content -LiteralPath (Join-Path $assetDir "SHA256SUMS-windows.txt")
          "ASSET_DIR=$($assetDir.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: cellsymphony-windows-release-assets
          path: release-assets/*
          retention-days: 30

  macos:
    name: macOS DMG
    runs-on: macos-latest
    needs: release_info
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release_info.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS DMG
        run: corepack pnpm --dir apps/desktop exec tauri build --bundles dmg --no-sign

      - name: Prepare macOS release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          dmg_path="$(find target/release/bundle/dmg -maxdepth 1 -name '*.dmg' 2>/dev/null | head -n 1 || true)"
          if [ -z "$dmg_path" ]; then
            echo "macOS DMG not found" >&2
            exit 1
          fi
          cp "$dmg_path" "release-assets/${{ needs.release_info.outputs.asset_prefix }}-macos-unsigned.dmg"
          (cd release-assets && shasum -a 256 *.dmg > SHA256SUMS-macos.txt)

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: cellsymphony-macos-release-assets
          path: release-assets/*
          retention-days: 30

  ubuntu:
    name: Ubuntu DEB and AppImage
    runs-on: ubuntu-22.04
    needs: release_info
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release_info.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libfuse2 \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            wget \
            xdg-utils

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Ubuntu bundles
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: corepack pnpm --dir apps/desktop exec tauri build --bundles deb,appimage

      - name: Prepare Ubuntu release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          deb_path="$(find target/release/bundle/deb -maxdepth 1 -name '*.deb' 2>/dev/null | head -n 1 || true)"
          appimage_path="$(find target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' 2>/dev/null | head -n 1 || true)"
          if [ -z "$deb_path" ]; then
            echo "Ubuntu DEB not found" >&2
            exit 1
          fi
          if [ -z "$appimage_path" ]; then
            echo "Ubuntu AppImage not found" >&2
            exit 1
          fi
          cp "$deb_path" "release-assets/${{ needs.release_info.outputs.asset_prefix }}-ubuntu-amd64.deb"
          cp "$appimage_path" "release-assets/${{ needs.release_info.outputs.asset_prefix }}-ubuntu-x86_64.AppImage"
          (cd release-assets && sha256sum *.deb *.AppImage > SHA256SUMS-ubuntu.txt)

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: cellsymphony-ubuntu-release-assets
          path: release-assets/*
          retention-days: 30

  pi_image:
    name: Raspberry Pi ready-to-flash image
    runs-on: ubuntu-latest
    needs: release_info
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release_info.outputs.tag }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install cross
        run: |
          curl -sSL https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-gnu.tar.gz | sudo tar xz -C /usr/local/bin
          cross --version

      - name: Generate Pi logo assets
        run: python3 tools/assets/generate_pi_logo_pngs.py

      - name: Build release Pi app
        run: cross build --release --target aarch64-unknown-linux-gnu -p cellsymphony-pi --features hardware-pi

      - name: Stage Pi app binary
        run: |
          install -D -m 0755 \
            target/aarch64-unknown-linux-gnu/release/cellsymphony-pi \
            tools/pi-image/stage4-cellsymphony/files/root/usr/local/bin/cellsymphony-pi
          file tools/pi-image/stage4-cellsymphony/files/root/usr/local/bin/cellsymphony-pi

      - name: Install pi-gen dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            quilt parted debootstrap dosfstools rsync btrfs-progs \
            kpartx xz-utils coreutils qemu-user-static libarchive-tools \
            arch-test device-tree-compiler unzip

      - name: Clone pi-gen
        run: |
          git clone --depth 1 --branch bookworm-arm64 https://github.com/RPi-Distro/pi-gen.git
          cp -r tools/pi-image/stage4-cellsymphony pi-gen/

      - name: Configure pi-gen
        working-directory: pi-gen
        run: |
          cat > config <<'EOL'
          IMG_NAME=cellsymphony-pi-zero-2w
          RELEASE=bookworm
          TARGET_ARCH=arm64
          STAGE_LIST="stage0 stage1 stage2 stage4-cellsymphony"
          EXPORT_DIR=deploy
          DEPLOY_ZIP=1
          ENABLE_SSH=0
          EOL

      - name: Run pi-gen build
        working-directory: pi-gen
        run: sudo ./build.sh

      - name: Find and rename Pi image
        id: pi_asset
        run: |
          set -euo pipefail
          mkdir -p release-assets
          ZIP_PATH="$(find pi-gen/deploy -maxdepth 1 -name '*.zip' | head -n 1)"
          if [ -z "$ZIP_PATH" ]; then
            echo "No pi-gen image zip found" >&2
            exit 1
          fi
          ASSET="release-assets/${{ needs.release_info.outputs.asset_prefix }}-pi-zero-2w.img.zip"
          cp "$ZIP_PATH" "$ASSET"
          python3 tools/pi-image/package-rpi-imager-zip.py \
            --zip "$ASSET" \
            --version "${{ needs.release_info.outputs.version }}" \
            --tag "${{ needs.release_info.outputs.tag }}" \
            --repository "$GITHUB_REPOSITORY" \
            --manifest-out "release-assets/${{ needs.release_info.outputs.asset_prefix }}-pi-zero-2w.rpi-imager-manifest"
          echo "zip=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Verify Pi image sanitation
        run: sudo bash tools/pi-image/verify-sanitized-image.sh "${{ steps.pi_asset.outputs.zip }}"

      - name: Write Pi checksums
        run: |
          cd release-assets
          sha256sum *.zip *.rpi-imager-manifest > SHA256SUMS-pi.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: cellsymphony-pi-image-release-assets
          path: release-assets/*
          retention-days: 30

  publish_release_assets:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: [release_info, windows, macos, ubuntu, pi_image]
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: cellsymphony-*-release-assets
          path: gathered-release-assets
          merge-multiple: true

      - name: Verify gathered assets
        run: |
          set -euo pipefail
          cd gathered-release-assets
          expected=(
            "${{ needs.release_info.outputs.asset_prefix }}-windows-installer.exe"
            "${{ needs.release_info.outputs.asset_prefix }}-windows-portable.exe"
            "${{ needs.release_info.outputs.asset_prefix }}-macos-unsigned.dmg"
            "${{ needs.release_info.outputs.asset_prefix }}-ubuntu-amd64.deb"
            "${{ needs.release_info.outputs.asset_prefix }}-ubuntu-x86_64.AppImage"
            "${{ needs.release_info.outputs.asset_prefix }}-pi-zero-2w.img.zip"
            "${{ needs.release_info.outputs.asset_prefix }}-pi-zero-2w.rpi-imager-manifest"
            SHA256SUMS-windows.txt
            SHA256SUMS-macos.txt
            SHA256SUMS-ubuntu.txt
            SHA256SUMS-pi.txt
          )
          for asset in "${expected[@]}"; do
            test -f "$asset" || { echo "Missing release asset: $asset" >&2; exit 1; }
          done
          sha256sum -c SHA256SUMS-windows.txt
          sha256sum -c SHA256SUMS-macos.txt
          sha256sum -c SHA256SUMS-ubuntu.txt
          sha256sum -c SHA256SUMS-pi.txt

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release_info.outputs.tag }}" gathered-release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
