name: Release Builds

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows_desktop_build:
    name: Build Windows Desktop App
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (release)
        run: pnpm run tauri:build

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Find NSIS installer
        id: find_installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          $installerName = $installer.Name
          echo "INSTALLER_PATH=$installer.FullName" >> $env:GITHUB_OUTPUT
          echo "INSTALLER_NAME=$installerName" >> $env:GITHUB_OUTPUT

      - name: Upload Windows desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: cellsymphony-desktop-windows
          path: ${{ steps.find_installer.outputs.INSTALLER_PATH }}
          retention-days: 90

      - name: Upload release asset (Windows)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.find_installer.outputs.INSTALLER_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
