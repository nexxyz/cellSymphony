name: CI

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint_ts:
    name: Lint TS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run lint
        run: pnpm run lint

  format_check_ts:
    name: Format Check TS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run format check
        run: pnpm run format:check

  typecheck_ts:
    name: Typecheck TS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run TS typecheck
        run: pnpm run typecheck

  test_ts:
    name: Test TS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run TS unit tests
        run: pnpm run test
      - name: Run TS tests with coverage
        run: pnpm run test:coverage
      - name: Upload TS coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ts-coverage
          path: |
            coverage
            **/coverage

  rust_fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Check format
        run: cargo fmt --all --check

  rust_lint:
    name: Rust clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run clippy (exclude desktop+pi+midi-sidecar)
        run: cargo clippy --workspace --exclude cellsymphony-pi --exclude cellsymphony-desktop --exclude midi-io-sidecar --all-targets -- -D warnings

  rust_test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run Rust tests (exclude desktop+pi+midi-sidecar)
        run: cargo test --workspace --exclude cellsymphony-pi --exclude cellsymphony-desktop --exclude midi-io-sidecar

  pi_zero_hal_build:
    name: Pi Zero HAL Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: armv7-unknown-linux-gnueabihf
      - name: Install ARM GCC
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Build HAL for Pi Zero 2W
        run: cargo build --target armv7-unknown-linux-gnueabihf -p cellsymphony-hal --features pi-zero

  pi_zero_app_build:
    name: Pi Zero App Build (Docker)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cross-rs/cross/armv7-unknown-linux-gnueabihf:main
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Pi app (with audio/MIDI)
        run: cargo build --target armv7-unknown-linux-gnueabihf -p cellsymphony-pi

  desktop_build_smoke:
    name: Desktop Build Smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build Tauri app (smoke)
        run: pnpm run tauri:build:ci
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-windows
          path: |
            **/*.log
            **/target/**/build


