name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint_ts:
    name: Lint TS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run lint
        run: pnpm run lint

  format_check_ts:
    name: Format Check TS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run format check
        run: pnpm run format:check

  typecheck_ts:
    name: Typecheck TS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run TS typecheck
        run: pnpm run typecheck

  test_ts:
    name: Test TS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run TS unit tests
        run: pnpm run test
      - name: Run TS tests with coverage
        run: pnpm run test:coverage

  rust_fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Check format
        run: cargo fmt --all --check

  rust_lint:
    name: Rust clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Linux audio build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Run clippy (exclude platform audio apps)
        run: cargo clippy --workspace --exclude octessera-desktop --exclude rodio-engine-source --all-targets -- -D warnings

  rust_test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Linux audio build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Run Rust tests (exclude platform audio apps)
        run: cargo test --workspace --exclude octessera-desktop --exclude rodio-engine-source

  rust_coverage:
    name: Rust coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Linux audio build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Run per-crate Rust coverage
        run: bash ./tools/quality/check-rust-coverage.sh

  pi_zero_hal_build:
    name: Pi Zero HAL Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-unknown-linux-gnu
      - name: Install ARM GCC
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Build HAL for Pi Zero 2W
        run: cargo build --target aarch64-unknown-linux-gnu -p octessera-hal --features pi-zero

  pi_zero_app_build:
    name: Pi Zero App Build (cross)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-unknown-linux-gnu
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Install cross (prebuilt binary)
        run: |
          curl -sSL https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin
          cross --version
      - name: Build Pi app with cross
        run: cross build --target aarch64-unknown-linux-gnu -p octessera-pi --features hardware-pi

  desktop_build_smoke:
    name: Desktop Build Smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build Tauri app (smoke)
        run: pnpm run tauri:build:ci
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-windows
          path: |
            **/*.log
            **/target/**/build
