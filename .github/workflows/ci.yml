name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run-heavy-ui-scenario:
        description: Run ignored factory patch UI scenario
        required: false
        default: "false"

permissions:
  contents: read
  pull-requests: read

jobs:
  lint_ts:
    name: Lint TS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run lint
        run: pnpm run lint

  format_check_ts:
    name: Format Check TS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run format check
        run: pnpm run format:check

  typecheck_ts:
    name: Typecheck TS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run TS typecheck
        run: pnpm run typecheck

  test_ts:
    name: Test TS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run TS unit tests
        run: pnpm run test
      - name: Run TS tests with coverage
        run: pnpm run test:coverage

  rust_fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Check format
        run: cargo fmt --all --check

  rust_lint:
    name: Rust clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Linux audio build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Run clippy (exclude platform audio apps)
        run: cargo clippy --workspace --exclude octessera-desktop --exclude rodio-engine-source --all-targets -- -D warnings

  rust_test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Linux audio build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Run Rust tests (exclude platform audio apps)
        run: cargo test --workspace --exclude octessera-desktop --exclude rodio-engine-source
      - name: Detect parity-sensitive changes
        id: parity_changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            runtime:
              - 'crates/platform-core/**'
              - 'crates/playback-runtime/**'
              - 'config/default.json'
              - 'config/defaults/**'
              - 'config/generated/**'
              - 'resources/menu-help-texts.tsv'
              - 'resources/platform-capabilities.json'
      - name: Run factory patch UI scenario
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && steps.parity_changes.outputs.runtime == 'true') || (github.event_name == 'workflow_dispatch' && inputs.run-heavy-ui-scenario == 'true')
        run: cargo test -p playback-runtime factory_patch_ui_scenario -- --ignored
      - name: Skip factory patch UI scenario
        if: (github.event_name == 'pull_request' && steps.parity_changes.outputs.runtime != 'true') || (github.event_name == 'workflow_dispatch' && inputs.run-heavy-ui-scenario != 'true')
        run: echo "Factory patch UI scenario skipped; no parity-sensitive change selected it."

  rust_coverage:
    name: Rust coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Linux audio build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Run per-crate Rust coverage
        run: bash ./tools/quality/check-rust-coverage.sh

  pi_zero_hal_build:
    name: Pi Zero HAL Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-unknown-linux-gnu
      - name: Install ARM GCC
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Build HAL for Pi Zero 2W
        run: cargo build --target aarch64-unknown-linux-gnu -p octessera-hal --features raspberry-pi-zero-2w
      - name: Compile legacy HAL feature alias
        run: cargo check --target aarch64-unknown-linux-gnu -p octessera-hal --features pi-zero

  pi_zero_app_build:
    name: Pi Zero App Build (cross)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-unknown-linux-gnu
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Install cross (prebuilt binary)
        run: |
          curl -sSL https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin
          cross --version
      - name: Build Pi app with cross
        run: cross build --target aarch64-unknown-linux-gnu -p octessera-pi --features hardware-raspberry-pi-zero-2w
      - name: Compile legacy Pi app feature alias
        run: cross check --target aarch64-unknown-linux-gnu -p octessera-pi --features hardware-pi

  board_profile_scripts:
    name: Board profile script checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Validate Raspberry profile boundaries
        run: |
          bash -n tools/pi/board-profile.sh tools/pi/build-pi-cross-wsl.sh tools/pi/deploy-pi.sh tools/pi/provision/provision.sh
          python3 tools/pi-image/test-board-profile.py
          bash tools/armbian-image/validate.sh

  board_profile_powershell:
    name: Board profile PowerShell checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Validate Raspberry profile boundaries
        shell: pwsh
        run: ./tools/pi/test-board-profile.ps1

  updater_protocol:
    name: Device updater protocol checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install shell checks
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Check updater Python transitions
        run: |
          python3 -m py_compile tools/device-update/updater_protocol.py tools/device-update/updater_state.py tools/device-update/updater_assets.py tools/device-update/updater_guard.py tools/device-update/updater_cli.py tools/device-update/test_updater_protocol.py tools/device-update/test_updater_layout.py
          python3 -m unittest discover -s tools/device-update -p 'test_*.py'
          bash tools/device-update/smoke-test.sh
      - name: Check updater shells and canonical copies
        run: |
          bash -n tools/device-update/octessera-update tools/device-update/octessera-update-guard tools/device-update/octessera-update-recovery tools/device-update/smoke-test.sh
          bash -n tools/pi-image/stage4-octessera/01-copy-binary/00-run.sh tools/pi-image/stage4-octessera/02-setup-service/00-run.sh tools/pi-image/verify-sanitized-image.sh
          bash -n tools/pi/provision/provision.sh tools/pi/deploy-pi.sh userpatches/customize-image.sh tools/armbian-image/validate.sh tools/armbian-image/inspect-built-image.sh
          shellcheck tools/device-update/*.sh
          cmp tools/device-update/octessera-update tools/pi-image/stage4-octessera/files/root/usr/local/sbin/octessera-update
          cmp tools/device-update/octessera-update userpatches/overlay/usr/local/sbin/octessera-update
          cmp tools/device-update/octessera-update-guard tools/pi-image/stage4-octessera/files/root/usr/local/sbin/octessera-update-guard
          cmp tools/device-update/octessera-update-guard userpatches/overlay/usr/local/sbin/octessera-update-guard
          cmp tools/device-update/octessera-update-recovery tools/pi-image/stage4-octessera/files/root/usr/local/sbin/octessera-update-recovery
          cmp tools/device-update/octessera-update-recovery userpatches/overlay/usr/local/sbin/octessera-update-recovery
          ! grep -Eq 'octessera-update-(guard|recovery)' tools/pi-image/stage4-octessera/files/root/etc/sudoers.d/octessera-update userpatches/overlay/etc/sudoers.d/octessera-update
          grep -q 'update-transaction.json' tools/pi/deploy-pi-fast.ps1
      - name: Validate Linux sudoers and systemd layout
        run: |
          sudo visudo -cf tools/pi-image/stage4-octessera/files/root/etc/sudoers.d/octessera-update
          sudo visudo -cf userpatches/overlay/etc/sudoers.d/octessera-update
          root="$(mktemp -d)"
          mkdir -p "$root/etc/systemd/system"
          printf '%s\n' '[Unit]' 'Description=CI validation sysinit target' > "$root/etc/systemd/system/sysinit.target"
          printf '%s\n' '[Unit]' 'Description=CI validation local filesystem target' > "$root/etc/systemd/system/local-fs.target"
          install -D -m 0755 tools/pi-image/stage4-octessera/files/root/usr/local/sbin/octessera-update-guard "$root/usr/local/sbin/octessera-update-guard"
          install -D -m 0755 tools/pi-image/stage4-octessera/files/root/usr/local/sbin/octessera-update-recovery "$root/usr/local/sbin/octessera-update-recovery"
          install -D -m 0644 tools/pi-image/stage4-octessera/files/root/etc/systemd/system/octessera-update-guard.service "$root/etc/systemd/system/octessera-update-guard.service"
          install -D -m 0644 tools/pi-image/stage4-octessera/files/root/etc/systemd/system/octessera-update-recovery.service "$root/etc/systemd/system/octessera-update-recovery.service"
          ! grep -q '^ConditionPathExists=' tools/pi-image/stage4-octessera/files/root/etc/systemd/system/octessera-update-recovery.service
          ! grep -q '^ConditionPathExists=' userpatches/overlay/etc/systemd/system/octessera-update-recovery.service
          systemd-analyze --root="$root" verify octessera-update-guard.service octessera-update-recovery.service
          rm -rf "$root"

  desktop_build_smoke:
    name: Desktop Build Smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build Tauri app (smoke)
        run: pnpm run tauri:build:ci
      - name: Run desktop Rust adapter tests
        run: cargo test -p octessera-desktop
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-windows
          path: |
            **/*.log
            **/target/**/build
